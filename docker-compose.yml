services:
  chat2skills:
    build:
      context: .
      dockerfile: Dockerfile
    image: chat2skill:latest
    container_name: chat2skills
    restart: unless-stopped
    ports:
      - "4744:4744"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=4744
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/chat2skills?schema=public}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: chat2skills-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=chat2skills
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat2skills"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
